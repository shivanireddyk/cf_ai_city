name = "cf-ai-city"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "CHAT_SESSION"
class_name = "ChatSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatSession"]

[assets]
directory = "./public"
binding = "ASSETS"
html_handling = "auto-trailing-slash"

[dev]
port = 8787
local_protocol = "http"
